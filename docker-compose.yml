services:
  fafnir-vault-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fafnir-vault-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      EnableHttpsRedirection: "${ENABLE_HTTPS_REDIRECTION:-false}"
      EnableSwagger: "${ENABLE_SWAGGER:-false}"
      ConnectionStrings__FafnirConnection: "${FAFNIR_CONNECTION_STRING}"
      Auth__TokenSecret: "${AUTH_TOKEN_SECRET}"
      Cors__AllowedOrigins__0: "${CORS_ALLOWED_ORIGIN_1:-}"
      Cors__AllowedOrigins__1: "${CORS_ALLOWED_ORIGIN_2:-}"
